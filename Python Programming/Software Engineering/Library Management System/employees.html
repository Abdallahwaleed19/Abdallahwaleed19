{% extends "base.html" %}

{% block content %}
<div class="employee-management">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="animate__animated animate__fadeInLeft">Employee Management</h1>
        <button class="btn btn-primary animate__animated animate__fadeInRight" data-bs-toggle="modal" data-bs-target="#addEmployeeModal">
            <i class="fas fa-user-plus me-2"></i>Add Employee
        </button>
    </div>
    
    <div class="card shadow-sm animate__animated animate__fadeIn">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Branch</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for employee in employees %}
                        <tr class="animate__animated animate__fadeIn">
                            <td>{{ employee.id }}</td>
                            <td>{{ employee.name }}</td>
                            <td>{{ employee.role }}</td>
                            <td>{{ employee.branch.name if employee.branch else 'Unassigned' }}</td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn-outline-danger">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Employee Modal -->
<div class="modal fade" id="addEmployeeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Employee</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="empName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="empName" required>
                    </div>
                    <div class="mb-3">
                        <label for="empRole" class="form-label">Role</label>
                        <select class="form-select" id="empRole" required>
                            <option value="">Select Role</option>
                            <option value="Librarian">Librarian</option>
                            <option value="Assistant">Assistant</option>
                            <option value="Manager">Manager</option>
                            <option value="IT Support">IT Support</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="empBranch" class="form-label">Branch</label>
                        <select class="form-select" id="empBranch" required>
                            <option value="">Select Branch</option>
                            {% for branch in branches %}
                            <option value="{{ branch.id }}">{{ branch.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Add Employee</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
