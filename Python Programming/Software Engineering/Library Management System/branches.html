{% extends "base.html" %}

{% block content %}
<div class="branch-management">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="animate__animated animate__fadeInLeft">Branch Management</h1>
        <button class="btn btn-primary animate__animated animate__fadeInRight" data-bs-toggle="modal" data-bs-target="#addBranchModal">
            <i class="fas fa-plus me-2"></i>Add Branch
        </button>
    </div>
    
    <div class="row g-4">
        {% for branch in branches %}
        <div class="col-md-4 animate__animated animate__fadeIn">
            <div class="card branch-card h-100 hover-grow">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">{{ branch.name }}</h5>
                </div>
                <div class="card-body">
                    <p class="card-text">
                        <i class="fas fa-map-marker-alt me-2"></i>{{ branch.location }}
                    </p>
                    <p class="card-text">
                        <i class="fas fa-phone me-2"></i>{{ branch.phone }}
                    </p>
                    <p class="card-text">
                        <i class="fas fa-users me-2"></i>{{ branch.employees|length }} employees
                    </p>
                </div>
                <div class="card-footer bg-transparent">
                    <div class="btn-group w-100">
                        <button class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-sm btn-outline-info">
                            <i class="fas fa-info-circle"></i> Details
                        </button>
                        <button class="btn btn-sm btn-outline-danger">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Add Branch Modal -->
<div class="modal fade" id="addBranchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Branch</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="branchName" class="form-label">Branch Name</label>
                        <input type="text" class="form-control" id="branchName" required>
                    </div>
                    <div class="mb-3">
                        <label for="branchLocation" class="form-label">Location</label>
                        <input type="text" class="form-control" id="branchLocation" required>
                    </div>
                    <div class="mb-3">
                        <label for="branchPhone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="branchPhone" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Add Branch</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
