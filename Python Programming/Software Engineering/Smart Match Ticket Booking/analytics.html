{% extends 'base.html' %}
{% block title %}Analytics | Smart Match Booking{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Site Analytics</h2>

    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card text-white bg-primary shadow">
                <div class="card-body">
                    <h5 class="card-title">Total Users</h5>
                    <p class="card-text display-4">{{ total_users }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-white bg-success shadow">
                <div class="card-body">
                    <h5 class="card-title">Total Football Matches</h5>
                    <p class="card-text display-4">{{ total_matches }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card text-white bg-info shadow">
                <div class="card-body">
                    <h5 class="card-title">Total Bookings</h5>
                    <p class="card-text display-4">{{ total_bookings }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
